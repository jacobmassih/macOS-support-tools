name: macOS 26 PR Build

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and Test on macOS 26
    runs-on: macos-latest  # Should support macOS 26
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check macOS version
        run: |
          sw_vers
          echo "macOS version: $(sw_vers -productVersion)"
      
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Verify Xcode version
        run: |
          xcodebuild -version
          xcrun --show-sdk-version
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-macos26-${{ hashFiles('**/Podfile.lock', '**/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-macos26-
      
      - name: Install dependencies
        run: |
          # Install any required dependencies
          # brew install <dependencies>
          echo "Installing dependencies..."
      
      - name: Build project
        run: |
          xcodebuild clean build \
            -project macos-support-tools.xcodeproj \
            -scheme macos-support-tools \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
      
      - name: Run unit tests
        run: |
          xcodebuild test \
            -project macos-support-tools.xcodeproj \
            -scheme macos-support-tools \
            -destination 'platform=macOS,arch=arm64' \
            -only-testing:macos-support-toolsTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
      
      - name: Run UI tests
        run: |
          xcodebuild test \
            -project macos-support-tools.xcodeproj \
            -scheme macos-support-tools \
            -destination 'platform=macOS,arch=arm64' \
            -only-testing:macos-support-toolsUITests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
      
      - name: Generate test report
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Build completed on macOS $(sw_vers -productVersion)" >> $GITHUB_STEP_SUMMARY
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: macos-support-tools-build-${{ github.event.pull_request.number }}
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Release/*.app
          retention-days: 7
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.event.pull_request.number }}
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
          retention-days: 7
          if-no-files-found: ignore
